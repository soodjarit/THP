<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THP CRM Phase 2.5 Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @media print {
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const projectData = [
            { id: 1, lot: 'Training', topic: 'Refresh Training', task: 'Salesforce Admin Training', start: '27-เม.ย.-26', end: '27-เม.ย.-26', owner: 'THP/Beryl8', progress: 0, status: 'Pending' },
            { id: 2, lot: 'Training', topic: 'Refresh Training', task: 'Salesforce Sales Training', start: '30-เม.ย.-26', end: '30-เม.ย.-26', owner: 'THP/Beryl8', progress: 0, status: 'Pending' },
            { id: 3, lot: 'Training', topic: 'Refresh Training', task: 'Salesforce Marketing Cloud Training', start: '04-พ.ค.-26', end: '04-พ.ค.-26', owner: 'THP/Beryl8', progress: 0, status: 'Pending' },
            { id: 4, lot: 'Training', topic: 'Refresh Training', task: 'Tableau Training', start: '07-พ.ค.-26', end: '07-พ.ค.-26', owner: 'THP/Beryl8', progress: 0, status: 'Pending' },
            { id: 5, lot: 'Training', topic: 'Refresh Training', task: 'Marketing Data Training (Builk One)', start: '11-พ.ค.-26', end: '11-พ.ค.-26', owner: 'THP/Beryl8', progress: 0, status: 'Pending' },
            { id: 6, lot: 'Lot#1', topic: 'เชื่อมต่อ THP middleware กับระบบ CRM', task: 'Requirement Gathering Session', start: '02-มี.ค.-26', end: '03-มี.ค.-26', owner: 'THP/Beryl8', progress: 100, status: 'Completed' },
            { id: 7, lot: 'Lot#1', topic: 'เชื่อมต่อ THP middleware กับระบบ CRM', task: 'System Design', start: '03-มี.ค.-26', end: '03-มี.ค.-26', owner: 'Beryl8', progress: 100, status: 'Completed' },
            { id: 8, lot: 'Lot#1', topic: 'เชื่อมต่อ THP middleware กับระบบ CRM', task: 'System Build', start: '04-มี.ค.-26', end: '05-มี.ค.-26', owner: 'Beryl8', progress: 100, status: 'Completed' },
            { id: 9, lot: 'Lot#1', topic: 'เชื่อมต่อ THP middleware กับระบบ CRM', task: 'Internal Test', start: '06-มี.ค.-26', end: '09-มี.ค.-26', owner: 'Beryl8', progress: 100, status: 'Completed' },
            { id: 10, lot: 'Lot#1', topic: 'เชื่อมต่อ THP middleware กับระบบ CRM', task: 'SIT & UAT', start: '10-มี.ค.-26', end: '11-มี.ค.-26', owner: 'THP/Beryl8', progress: 100, status: 'Completed' },
            { id: 11, lot: 'Lot#1', topic: 'เชื่อมต่อ THP middleware กับระบบ CRM', task: 'Duplicated Data Cleansing', start: '11-มี.ค.-26', end: '23-มี.ค.-26', owner: 'THP/Beryl8', progress: 100, status: 'Completed' },
            { id: 12, lot: 'Lot#1', topic: 'เชื่อมต่อ THP middleware กับระบบ CRM', task: 'Production Deployment', start: '24-มี.ค.-26', end: '27-มี.ค.-26', owner: 'Beryl8', progress: 0, status: 'Pending' },
            { id: 13, lot: 'Lot#1', topic: 'ปรับโครงสร้าง Sales Team', task: 'Confirm Scope and Project Kick-off', start: '30-มี.ค.-26', end: '30-มี.ค.-26', owner: 'THP/Beryl8', progress: 0, status: 'Pending' },
            { id: 14, lot: 'Lot#1', topic: 'ปรับโครงสร้าง Sales Team', task: 'System Build', start: '03-เม.ย.-26', end: '08-เม.ย.-26', owner: 'Beryl8', progress: 0, status: 'Pending' },
            { id: 15, lot: 'Lot#2', topic: 'Snapshot data storage', task: 'Requirement Confirmation', start: '20-เม.ย.-26', end: '22-เม.ย.-26', owner: 'THP/Beryl8', progress: 0, status: 'Pending' },
            { id: 16, lot: 'Lot#2', topic: 'Point Exchange', task: 'System Build', start: '04-พ.ค.-26', end: '22-พ.ค.-26', owner: 'Beryl8', progress: 0, status: 'Pending' },
            { id: 17, lot: 'Lot#2', topic: 'LINE UUID Integration', task: 'System Design', start: '23-เม.ย.-26', end: '30-เม.ย.-26', owner: 'Beryl8', progress: 0, status: 'Pending' },
            { id: 18, lot: 'Lot#3', topic: 'Requirement บล. (New) (e-Claim)', task: 'System Build', start: '15-มิ.ย.-26', end: '10-ก.ค.-26', owner: 'Beryl8', progress: 0, status: 'Pending' },
            { id: 19, lot: 'Lot#3', topic: 'ปรับ Quotation ลดพิเศษ', task: 'Internal Test', start: '25-ก.ค.-26', end: '31-ก.ค.-26', owner: 'Beryl8', progress: 0, status: 'Pending' },
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const StatCard = ({ iconName, label, value, colorClass }) => (
            <div className={`bg-white p-5 rounded-2xl shadow-sm border-l-4 ${colorClass} flex items-center gap-4 hover:shadow-md transition-shadow`}>
                <div className="p-3 bg-slate-50 rounded-xl text-slate-600">
                    <Icon name={iconName} size={24} />
                </div>
                <div>
                    <p className="text-xs font-bold text-slate-500 uppercase tracking-wider">{label}</p>
                    <p className="text-2xl font-black text-slate-900">{value}</p>
                </div>
            </div>
        );

        const App = () => {
            const [filterLot, setFilterLot] = useState('All');
            const [filterStatus, setFilterStatus] = useState('All');
            const [filterOwner, setFilterOwner] = useState('All');
            const [searchTerm, setSearchTerm] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: 'id', direction: 'asc' });

            const lots = ['All', 'Training', 'Lot#1', 'Lot#2', 'Lot#3'];
            const statuses = ['All', 'Completed', 'In Progress', 'Pending'];
            const owners = useMemo(() => ['All', ...new Set(projectData.map(d => d.owner))].sort(), []);

            const handleSort = (key) => {
                setSortConfig(prev => ({
                    key,
                    direction: prev.key === key && prev.direction === 'asc' ? 'desc' : 'asc'
                }));
            };

            const filteredData = useMemo(() => {
                let result = projectData.filter(item => {
                    return (filterLot === 'All' || item.lot === filterLot) &&
                           (filterStatus === 'All' || item.status === filterStatus) &&
                           (filterOwner === 'All' || item.owner === filterOwner) &&
                           (item.task.toLowerCase().includes(searchTerm.toLowerCase()) || 
                            item.topic.toLowerCase().includes(searchTerm.toLowerCase()));
                });

                if (sortConfig.key) {
                    result.sort((a, b) => {
                        if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return result;
            }, [filterLot, filterStatus, filterOwner, searchTerm, sortConfig]);

            const stats = useMemo(() => {
                const total = projectData.length;
                return {
                    total,
                    completed: projectData.filter(t => t.status === 'Completed').length,
                    pending: projectData.filter(t => t.status === 'Pending').length,
                    avg: Math.round(projectData.reduce((acc, curr) => acc + curr.progress, 0) / total)
                };
            }, []);

            return (
                <div className="min-h-screen p-4 md:p-10">
                    <div className="max-w-7xl mx-auto">
                        
                        {/* Top Navigation / Share */}
                        <div className="flex justify-end mb-6 gap-2 no-print">
                            <button className="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-50 transition-all shadow-sm">
                                <Icon name="share-2" size={16}/> Share Dashboard
                            </button>
                            <button onClick={() => window.print()} className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition-all shadow-md shadow-blue-200">
                                <Icon name="download" size={16}/> Export Report
                            </button>
                        </div>

                        {/* Header */}
                        <div className="bg-white rounded-3xl p-8 mb-8 shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-5">
                                <div className="p-4 bg-red-50 rounded-2xl text-red-600">
                                    <Icon name="layout-dashboard" size={40} />
                                </div>
                                <div>
                                    <h1 className="text-3xl font-black text-slate-900">THP CRM Phase 2.5</h1>
                                    <p className="text-slate-500 font-medium">Project Progress Monitoring Dashboard</p>
                                </div>
                            </div>
                            <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 min-w-[240px]">
                                <div className="flex justify-between items-end mb-2">
                                    <span className="text-xs font-bold text-slate-500 uppercase">Overall Progress</span>
                                    <span className="text-2xl font-black text-blue-600 leading-none">{stats.avg}%</span>
                                </div>
                                <div className="w-full h-3 bg-white border border-slate-200 rounded-full overflow-hidden">
                                    <div className="h-full bg-blue-600 rounded-full transition-all duration-1000" style={{ width: `${stats.avg}%` }}></div>
                                </div>
                            </div>
                        </div>

                        {/* Stats Summary */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                            <StatCard iconName="activity" label="Total Tasks" value={stats.total} colorClass="border-blue-500" />
                            <StatCard iconName="check-circle" label="Completed" value={stats.completed} colorClass="border-green-500" />
                            <StatCard iconName="clock" label="Pending" value={stats.pending} colorClass="border-amber-500" />
                            <StatCard iconName="calendar" label="Project Days" value="179" colorClass="border-slate-500" />
                        </div>

                        {/* Gemini Project Analysis Section */}
                        <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-8 mb-8 text-white shadow-xl shadow-blue-100 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-10">
                                <Icon name="sparkles" size={120} />
                            </div>
                            <div className="relative z-10">
                                <div className="flex items-center gap-2 mb-6">
                                    <div className="bg-white/20 p-2 rounded-lg backdrop-blur-md">
                                        <Icon name="brain-circuit" size={24} />
                                    </div>
                                    <h2 className="text-xl font-bold uppercase tracking-widest">Project Analysis by Gemini</h2>
                                </div>
                                
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    {/* Summary Insight */}
                                    <div className="bg-white/10 backdrop-blur-md rounded-2xl p-5 border border-white/20">
                                        <h3 className="font-bold text-blue-100 mb-3 flex items-center gap-2">
                                            <Icon name="rocket" size={18}/> Executive Summary
                                        </h3>
                                        <p className="text-sm leading-relaxed text-blue-50">
                                            โครงการดำเนินการไปได้ <span className="font-bold text-white">11.2%</span> โดยในส่วน <span className="font-bold text-white">Lot 1 (Middleware Connection)</span> ทำงานได้ดีเยี่ยม บรรลุเป้าหมายการทดสอบ SIT/UAT และ Data Cleansing ครบถ้วน 100% ตามกำหนดการ
                                        </p>
                                    </div>

                                    {/* Key Observation */}
                                    <div className="bg-white/10 backdrop-blur-md rounded-2xl p-5 border border-white/20">
                                        <h3 className="font-bold text-blue-100 mb-3 flex items-center gap-2">
                                            <Icon name="target" size={18}/> Critical Milestones
                                        </h3>
                                        <ul className="text-sm space-y-2 text-blue-50">
                                            <li className="flex gap-2">
                                                <div className="mt-1"><Icon name="arrow-right" size={12}/></div>
                                                <span><span className="font-bold text-white">Deployment:</span> แผนการขึ้นระบบ Lot 1 ในช่วง 24-27 มี.ค. เป็นขั้นตอนสำคัญถัดไป</span>
                                            </li>
                                            <li className="flex gap-2">
                                                <div className="mt-1"><Icon name="arrow-right" size={12}/></div>
                                                <span><span className="font-bold text-white">Training Phase:</span> ช่วงปลายเดือนเมษายนจะมีกิจกรรม Training หนาแน่นที่ต้องการการประสานงานสูง</span>
                                            </li>
                                        </ul>
                                    </div>

                                    {/* Risks */}
                                    <div className="bg-white/10 backdrop-blur-md rounded-2xl p-5 border border-white/20">
                                        <h3 className="font-bold text-blue-100 mb-3 flex items-center gap-2">
                                            <Icon name="alert-triangle" size={18}/> Risk & Recommendation
                                        </h3>
                                        <p className="text-sm leading-relaxed text-blue-50">
                                            <span className="font-bold text-white underline italic">ระวัง:</span> การทำ <span className="font-bold text-white">Data Migration ใน Lot 2</span> ที่ใช้เวลาถึง 24 วัน ควรตรวจสอบทรัพยากรระบบเพื่อไม่ให้กระทบต่อ THP Daily Operation ตามหมายเหตุในแผนงาน
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Control Bar */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 space-y-4 no-print">
                            <div className="flex flex-wrap items-center gap-4">
                                <div className="flex-1 min-w-[300px] relative">
                                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                                        <Icon name="search" size={18} />
                                    </div>
                                    <input 
                                        type="text" 
                                        placeholder="ค้นหาตามชื่องาน หรือหัวข้อ..." 
                                        className="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                <div className="flex flex-wrap gap-4 items-center">
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs font-bold text-slate-500 uppercase tracking-tighter">Lot:</span>
                                        <div className="flex bg-slate-100 p-1 rounded-lg">
                                            {lots.map(l => (
                                                <button key={l} onClick={() => setFilterLot(l)} className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${filterLot === l ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>{l}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs font-bold text-slate-500 uppercase tracking-tighter">Owner:</span>
                                        <select value={filterOwner} onChange={(e) => setFilterOwner(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1 text-xs font-bold focus:outline-none">
                                            {owners.map(o => <option key={o} value={o}>{o === 'All' ? 'All Owners' : o}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs font-bold text-slate-500 uppercase tracking-tighter">Status:</span>
                                        <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1 text-xs font-bold focus:outline-none">
                                            {statuses.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Table */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="overflow-x-auto custom-scrollbar">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50 border-b border-slate-200">
                                            <th className="px-6 py-4 cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('lot')}>
                                                <div className="flex items-center text-xs font-black text-slate-500 uppercase">LOT <Icon name="arrow-up-down" size={12} className="ml-1 opacity-30"/></div>
                                            </th>
                                            <th className="px-6 py-4 cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('topic')}>
                                                <div className="flex items-center text-xs font-black text-slate-500 uppercase">TOPIC <Icon name="arrow-up-down" size={12} className="ml-1 opacity-30"/></div>
                                            </th>
                                            <th className="px-6 py-4 cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('task')}>
                                                <div className="flex items-center text-xs font-black text-slate-500 uppercase">TASK DETAIL <Icon name="arrow-up-down" size={12} className="ml-1 opacity-30"/></div>
                                            </th>
                                            <th className="px-6 py-4 text-center cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('progress')}>
                                                <div className="flex items-center justify-center text-xs font-black text-slate-500 uppercase">PROGRESS <Icon name="arrow-up-down" size={12} className="ml-1 opacity-30"/></div>
                                            </th>
                                            <th className="px-6 py-4 cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => handleSort('owner')}>
                                                <div className="flex items-center text-xs font-black text-slate-500 uppercase">OWNER <Icon name="arrow-up-down" size={12} className="ml-1 opacity-30"/></div>
                                            </th>
                                            <th className="px-6 py-4">
                                                <div className="text-xs font-black text-slate-500 uppercase">SCHEDULE</div>
                                            </th>
                                            <th className="px-6 py-4 cursor-pointer hover:bg-slate-100 transition-colors text-right" onClick={() => handleSort('status')}>
                                                <div className="flex items-center justify-end text-xs font-black text-slate-500 uppercase">STATUS <Icon name="arrow-up-down" size={12} className="ml-1 opacity-30"/></div>
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {filteredData.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50/50 transition-colors group">
                                                <td className="px-6 py-4">
                                                    <span className={`px-2 py-0.5 rounded text-[10px] font-black uppercase ${item.lot === 'Lot#1' ? 'bg-purple-100 text-purple-700' : (item.lot === 'Training' ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-600')}`}>
                                                        {item.lot}
                                                    </span>
                                                </td>
                                                <td className="px-6 py-4">
                                                    <span className="text-xs font-semibold text-slate-500 line-clamp-1" title={item.topic}>{item.topic}</span>
                                                </td>
                                                <td className="px-6 py-4">
                                                    <p className="text-sm font-bold text-slate-800 group-hover:text-blue-600 transition-colors">{item.task}</p>
                                                </td>
                                                <td className="px-6 py-4">
                                                    <div className="flex flex-col items-center">
                                                        <span className="text-[10px] font-bold text-slate-500 mb-1">{item.progress}%</span>
                                                        <div className="w-20 h-1.5 bg-slate-100 rounded-full border border-slate-200 overflow-hidden">
                                                            <div className={`h-full transition-all duration-700 ${item.progress === 100 ? 'bg-green-500' : (item.progress > 0 ? 'bg-blue-600' : 'bg-slate-300')}`} style={{ width: `${item.progress}%` }}></div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td className="px-6 py-4">
                                                    <span className="text-[11px] font-bold text-slate-600 whitespace-nowrap">{item.owner}</span>
                                                </td>
                                                <td className="px-6 py-4">
                                                    <div className="text-[10px] font-medium text-slate-500 whitespace-nowrap">
                                                        <div className="flex items-center gap-1 font-bold text-slate-700"><Icon name="calendar" size={10}/> {item.start}</div>
                                                        <div className="opacity-60 ml-3.5 italic">ถึง {item.end}</div>
                                                    </div>
                                                </td>
                                                <td className="px-6 py-4 text-right">
                                                    <span className={`px-2 py-1 rounded-full text-[9px] font-black uppercase border tracking-widest ${
                                                        item.status === 'Completed' ? 'bg-green-100 text-green-700 border-green-200' : 
                                                        item.status === 'Pending' ? 'bg-slate-100 text-slate-500 border-slate-200' : 
                                                        'bg-blue-100 text-blue-700 border-blue-200'
                                                    }`}>
                                                        {item.status}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
